services:
  postgres:
    image: postgres:16-alpine
    container_name: bpc-pos-postgres
    environment:
      POSTGRES_DB: bpc_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8-alpine
    container_name: bpc-pos-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: bpc-pos-libretranslate
    ports:
      - "5000:5000"
    environment:
      LT_LOAD_ONLY: en,bn
      LT_THREADS: 2
      LT_CHAR_LIMIT: 2000
    volumes:
      - libretranslate_data:/home/libretranslate/.local

volumes:
  postgres_data:
  valkey_data:
  libretranslate_data:
