version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        pnpm prisma:push
        if [ "${SEED_ON_BOOT:-false}" = "true" ]; then
          pnpm prisma:seed
        fi
        exec pnpm exec next start --hostname 0.0.0.0 --port 3000
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      VALKEY_URL: ${VALKEY_URL:-redis://valkey:6379}
      LIBRETRANSLATE_URL: ${LIBRETRANSLATE_URL:-http://libretranslate:5000/translate}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      APP_URL: ${APP_URL}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Asia/Dhaka}
      SEED_ON_BOOT: ${SEED_ON_BOOT:-false}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      libretranslate:
        condition: service_started
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/v1/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bpc_pos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bpc_pos}
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command:
      - valkey-server
      - --appendonly
      - yes
    expose:
      - "6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test:
        - CMD
        - valkey-cli
        - -h
        - 127.0.0.1
        - ping
      interval: 10s
      timeout: 5s
      retries: 10

  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: en,bn
      LT_THREADS: ${LT_THREADS:-2}
      LT_CHAR_LIMIT: ${LT_CHAR_LIMIT:-2000}
    expose:
      - "5000"
    volumes:
      - libretranslate_data:/home/libretranslate/.local

volumes:
  postgres_data:
  valkey_data:
  libretranslate_data:
